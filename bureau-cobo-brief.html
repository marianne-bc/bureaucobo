<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Brief — Bureau Cobo</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1a;
    --fg: #e8e8e8;
    --mid: #888880;
    --dim: rgba(232,232,232,0.22);
    --line: rgba(232,232,232,0.08);
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Nav */
  .site-nav {
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .nav-back {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--fg); }
  .nav-circle { font-size: 14px; color: var(--mid); }

  /* Terminal wrap */
  .terminal-wrap {
    flex: 1;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 40px 80px;
    display: flex;
    flex-direction: column;
  }

  /* Intro */
  .terminal-intro {
    margin-bottom: 40px;
  }
  .intro-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .intro-sub {
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.06em;
  }

  /* Progress */
  .progress-wrap {
    margin-bottom: 40px;
  }
  .progress-bar {
    height: 1px;
    background: var(--line);
    position: relative;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--mid);
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-align: right;
    display: block;
  }

  /* History */
  .history {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 28px;
  }
  .history-item {
    opacity: 0;
    animation: fadeSlide 0.25s ease forwards;
  }
  .history-q {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 3px;
  }
  .history-q::before { content: '> '; }
  .history-a {
    font-size: 12px;
    color: rgba(232,232,232,0.38);
    padding-left: 16px;
    line-height: 1.5;
  }

  /* Current question */
  .current-block {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .current-prompt {
    font-size: 13px;
    color: var(--fg);
    line-height: 1.6;
    min-height: 1.6em;
  }
  .current-prompt::before {
    content: '> ';
    color: var(--mid);
  }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-left: 16px;
  }
  .opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 10px;
    margin: 0 -10px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.12s;
    font-size: 12px;
    color: var(--mid);
    line-height: 1.4;
    user-select: none;
  }
  .opt:hover { background: rgba(232,232,232,0.05); color: var(--fg); }
  .opt.selected { color: var(--fg); }
  .opt-num {
    font-size: 10px;
    color: rgba(232,232,232,0.2);
    min-width: 20px;
    flex-shrink: 0;
  }
  .opt.selected .opt-num { color: var(--mid); }

  /* Input row */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }
  .input-prefix {
    font-size: 13px;
    color: var(--mid);
    flex-shrink: 0;
  }
  #termInput {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: var(--fg);
    width: 100%;
    caret-color: var(--fg);
  }
  #termInput::placeholder { color: rgba(232,232,232,0.18); font-size: 11px; }

  .input-hint {
    font-size: 10px;
    color: rgba(232,232,232,0.18);
    letter-spacing: 0.06em;
    padding-left: 26px;
    margin-top: 6px;
  }

  /* Error shake */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.28s ease; }

  /* Success */
  .success-screen {
    display: none;
    padding: 8px 0;
  }
  .success-screen.visible { display: block; }
  .success-line {
    font-size: 12px;
    color: var(--mid);
    margin-bottom: 16px;
  }
  .success-line::before { content: '> '; }
  .success-body {
    font-size: 13px;
    color: rgba(232,232,232,0.55);
    line-height: 1.9;
    padding-left: 16px;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .site-nav, .terminal-wrap { padding-left: 24px; padding-right: 24px; }
    .terminal-wrap { padding-top: 36px; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="https://bureaucobo.com" class="nav-back">← Bureau Cobo</a>
  <span class="nav-circle">○</span>
</nav>

<div class="terminal-wrap">

  <div class="terminal-intro">
    <p class="intro-title">Bureau Cobo / Event Brief</p>
    <p class="intro-sub">feed the engine — we'll be back within 48h</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">— / —</span>
  </div>

  <div class="history" id="history"></div>

  <div class="current-block" id="currentBlock">
    <div class="current-prompt" id="promptText"></div>
    <div class="options-list" id="optsList"></div>
    <div class="input-row">
      <span class="input-prefix">_</span>
      <input type="text" id="termInput" autocomplete="off" spellcheck="false">
    </div>
    <p class="input-hint" id="inputHint"></p>
  </div>

  <div class="success-screen" id="successScreen">
    <p class="success-line">brief received.</p>
    <p class="success-body">
      We'll review everything and be back within 48 hours<br>
      with venue options and a first budget proposal.
    </p>
  </div>

</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz5_KGNOF6fhKuAW1RTM_aBrO9bA2UdkOx9Gx3R8IwIPGB5d9jAzUvcI1BOA9aQrVFBtg/exec';

const questions = [
  { key:'name',          type:'text',   prompt:"your name?" },
  { key:'company',       type:'text',   prompt:"company or project?" },
  { key:'email',         type:'text',   prompt:"email address?" },
  { key:'role',          type:'text',   prompt:"your role?", skip:true },
  { key:'event_type',    type:'choice', prompt:"type of event?",
    opts:['Private dinner','Cocktail reception','Conference side event','Corporate retreat','Product launch','Other'] },
  { key:'event_name',    type:'text',   prompt:"event name, if you have one", skip:true },
  { key:'city',          type:'text',   prompt:"city and country?" },
  { key:'pax',           type:'text',   prompt:"number of guests?" },
  { key:'event_date',    type:'text',   prompt:"preferred date(s)?" },
  { key:'date_flexible', type:'choice', prompt:"is the date flexible?",
    opts:['Yes','No','Somewhat'] },
  { key:'occasion',      type:'text',   prompt:"what's the occasion — and what do you want guests to feel?" },
  { key:'format',        type:'choice', prompt:"format?",
    opts:['Seated dinner','Standing cocktail','Mixed (cocktail then seated)','No preference'] },
  { key:'indoor_outdoor',type:'choice', prompt:"indoor or outdoor?",
    opts:['Indoor','Outdoor','Both / no preference'] },
  { key:'must_haves',    type:'text',   prompt:"must-haves", skip:true },
  { key:'avoid',         type:'text',   prompt:"anything to avoid", skip:true },
  { key:'dietary',       type:'text',   prompt:"dietary requirements", skip:true },
  { key:'invite_format', type:'choice', prompt:"invitation format?",
    opts:['Printed & physically mailed','Digital only','Both printed and digital','Not needed'] },
  { key:'mailing_list',  type:'choice', prompt:"mailing list ready?",
    opts:['Yes, ready','Still collecting','Need help'],
    when: a => a.invite_format==='Printed & physically mailed' || a.invite_format==='Both printed and digital' },
  { key:'print_notes',   type:'text',   prompt:"print & design notes", skip:true,
    when: a => a.invite_format==='Printed & physically mailed' || a.invite_format==='Both printed and digital' },
  { key:'rsvp_type',     type:'choice', prompt:"RSVP type?",
    opts:['Named RSVP (personalised per guest)','Simple yes / no','Digital platform (Luma, Eventbrite...)','No RSVP needed'] },
  { key:'rsvp_notes',    type:'text',   prompt:"RSVP notes", skip:true },
  { key:'budget',        type:'choice', prompt:"approximate total budget?",
    opts:['Under €10,000','€10,000 – €20,000','€20,000 – €40,000','€40,000 – €80,000','€80,000 – €150,000','€150,000+'] },
  { key:'budget_notes',  type:'text',   prompt:"budget notes", skip:true },
  { key:'gift',          type:'choice', prompt:"guest gift?",
    opts:['Yes','No','Not sure yet'] },
  { key:'gift_type',     type:'multi',  prompt:"gift type? select all that apply",
    opts:['Something local','Branded merch','Food or drink','Object / lifestyle','Experience','Open to suggestions'],
    when: a => a.gift==='Yes' },
  { key:'gift_budget',   type:'choice', prompt:"budget per guest?",
    opts:['Under €10','€10–€20','€20–€40','€40–€80','No constraint'],
    when: a => a.gift==='Yes' },
  { key:'gift_branding', type:'choice', prompt:"custom branding on the gift?",
    opts:['Yes','No','Not sure'],
    when: a => a.gift==='Yes' },
  { key:'gift_notes',    type:'text',   prompt:"gift notes", skip:true,
    when: a => a.gift==='Yes' },
  { key:'branding',      type:'choice', prompt:"branded elements needed?",
    opts:['Yes','No','Not sure yet'] },
  { key:'branding_notes',type:'text',   prompt:"branding requirements", skip:true,
    when: a => a.branding==='Yes' },
  { key:'other',         type:'text',   prompt:"anything else we should know", skip:true },
  { key:'heard',         type:'text',   prompt:"how did you hear about Bureau Cobo", skip:true },
];

const answers = {};
let idx = 0;
let multiSelected = [];

function activeQ() {
  return questions.filter(q => !q.when || q.when(answers));
}

function updateProgress() {
  const aq = activeQ();
  const total = aq.length;
  const done = idx;
  const pct = total > 0 ? Math.min((done / total) * 100, 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
}

let typeTimer = null;
function typeWrite(el, text, cb) {
  if (typeTimer) clearInterval(typeTimer);
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typeTimer);
      typeTimer = null;
      if (cb) cb();
    }
  }, 16);
}

function showQ(i) {
  const aq = activeQ();
  idx = i;
  updateProgress();

  if (i >= aq.length) {
    finish();
    return;
  }

  const q = aq[i];
  multiSelected = [];

  const promptEl  = document.getElementById('promptText');
  const optsEl    = document.getElementById('optsList');
  const inputEl   = document.getElementById('termInput');
  const hintEl    = document.getElementById('inputHint');

  optsEl.innerHTML = '';
  inputEl.value = '';
  hintEl.textContent = '';

  typeWrite(promptEl, q.prompt, () => {
    if (q.type === 'choice' || q.type === 'multi') {
      q.opts.forEach((opt, n) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerHTML = `<span class="opt-num">[${n+1}]</span><span>${opt}</span>`;
        div.addEventListener('click', () => {
          if (q.type === 'choice') {
            commitAnswer(q, opt);
          } else {
            const si = multiSelected.indexOf(opt);
            if (si === -1) { multiSelected.push(opt); div.classList.add('selected'); }
            else           { multiSelected.splice(si,1); div.classList.remove('selected'); }
            inputEl.focus();
          }
        });
        optsEl.appendChild(div);
      });

      if (q.type === 'choice') {
        inputEl.placeholder = 'type a number';
        hintEl.textContent  = 'or tap an option above';
      } else {
        inputEl.placeholder = 'type numbers, e.g. 1,3';
        hintEl.textContent  = 'or tap options above — press enter to confirm';
      }
    } else {
      inputEl.placeholder = q.skip ? 'answer or press enter to skip' : 'your answer';
    }

    inputEl.focus();
  });
}

function commitAnswer(q, value) {
  answers[q.key] = value;

  const hist = document.getElementById('history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-q">${q.prompt}</div>
    <div class="history-a">${value || '—'}</div>
  `;
  hist.appendChild(item);
  item.scrollIntoView({ behavior:'smooth', block:'nearest' });

  setTimeout(() => showQ(idx + 1), 240);
}

document.getElementById('termInput').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;

  const aq  = activeQ();
  const q   = aq[idx];
  const val = this.value.trim();

  if (q.type === 'choice') {
    const n = parseInt(val);
    if (n >= 1 && n <= q.opts.length) {
      commitAnswer(q, q.opts[n - 1]);
    } else {
      this.classList.add('shake');
      setTimeout(() => this.classList.remove('shake'), 300);
    }
    return;
  }

  if (q.type === 'multi') {
    if (val) {
      val.split(',').forEach(s => {
        const n = parseInt(s.trim());
        if (n >= 1 && n <= q.opts.length) {
          const opt = q.opts[n - 1];
          if (!multiSelected.includes(opt)) multiSelected.push(opt);
        }
      });
    }
    commitAnswer(q, multiSelected.join(', '));
    return;
  }

  // text
  if (!val && !q.skip) {
    this.placeholder = 'please type something first';
    this.classList.add('shake');
    setTimeout(() => this.classList.remove('shake'), 300);
    return;
  }
  commitAnswer(q, val);
});

function finish() {
  document.getElementById('currentBlock').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'done';
  document.getElementById('successScreen').classList.add('visible');

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(answers)
  });
}

// Start
showQ(0);
</script>
</body>
</html>
